<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA3 FAN QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6a1b9a; --secondary: #8e24aa; --accent: #ffeb3b; --bg: #f3e5f5; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 420px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #e1bee7; border-radius: 12px; font-size: 1rem; box-sizing: border-box; text-align: center; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; width: 100%; font-weight: 500; transition: 0.3s; }
        #timer-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: #4caf50; transition: 1s linear; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .opt-btn { background: #fafafa; color: #333; border: 2px solid #f3e5f5; text-align: left; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .correct { background: #4caf50 !important; color: white !important; border-color: #4caf50 !important; }
        .wrong { background: #f44336 !important; color: white !important; border-color: #f44336 !important; }
        .rank-box { margin-top: 20px; background: #fdfae1; padding: 15px; border-radius: 12px; text-align: left; border: 1px solid #fbc02d; }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1 style="color: var(--primary); margin-bottom: 5px;">😎 NA3 FAN QUIZ</h1>
        <p style="color: #666; margin-top: 0;">ใครคือตัวจริงของ NA3 มาพิสูจน์กัน!</p>
        <input type="text" id="username" placeholder="ระบุชื่อเท่ๆ ของคุณ" maxlength="20">
        <button id="btn-start">เริ่มโชว์เก๋า</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;">
            <span id="q-number" style="color: var(--primary); font-weight: bold;">ข้อที่ 1/10</span>
            <span id="score-now" style="background: var(--primary); color: white; padding: 3px 10px; border-radius: 10px;">0</span>
        </div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <h2 id="question-text" style="font-size: 1.2rem; min-height: 50px; margin: 10px 0;">?</h2>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="card hidden">
        <h2 style="margin: 0;">จบการทดสอบ!</h2>
        <p>คะแนนความเก๋าของคุณคือ</p>
        <div style="font-size: 4rem; font-weight: 700; color: var(--primary);" id="final-score">0</div>
        <p id="save-status" style="color: #888;">กำลังบันทึกคะแนน...</p>
        <div class="rank-box">
            <strong style="color: #f57f17;">🏆 Top 5 ความเท่</strong>
            <div id="rank-list" style="font-size: 0.9rem; margin-top: 5px;"></div>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; background: #444;">เล่นอีกรอบ</button>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script>
        const FIREBASE_URL = "https://quizgame-bd719-default-rtdb.asia-southeast1.firebasedatabase.app/na3_nont_scores.json";

        const questions = [
            { q: "1. NA 3 คืออะไร?", a: ["ผู้คน", "สถานที่", "รถ", "บ้าน"], c: 0 },
            { q: "2. ใครที่เท่ที่สุดใน NA3?", a: ["นนท์", "นนท์เท่", "นนท์เฟี้ยว", "นนท์เก่ว"], c: 0 },
            { q: "3. ถ้าพูดถึงความเฟี้ยวใน NA3 ต้องนึกถึงใคร?", a: ["คนอื่น", "นนท์คนเดิม", "น๊นท์ (เสียงสูง)", "ถูกทุกข้อที่คือนนท์"], c: 1 },
            { q: "4. นนท์ NA3 มีดีที่ตรงไหน?", a: ["หน้าตา", "ความเท่", "ความเก๋า", "ถูกทุกข้อ"], c: 3 },
            { q: "5. วันไหนที่นนท์จะหยุดเท่?", a: ["วันจันทร์", "วันหยุด", "ไม่มีวันนั้น", "วันลาพักร้อน"], c: 2 },
            { q: "6. ระดับความหล่อของนนท์ใน NA3 คือข้อใด?", a: ["พอใช้", "ดีมาก", "ทะลุปรอท", "เกินต้านทาน"], c: 3 },
            { q: "7. ท่าประจำตัวของนนท์ที่ทุกคนต้องจำคือ?", a: ["ท่ายิ้มกระชากใจ", "ท่ายืนสุดเท่", "ท่าเดินเฟี้ยวๆ", "ท่าไหนก็เท่ถ้าเป็นนนท์"], c: 3 },
            { q: "8. ถ้า NA3 ไม่มีนนท์จะเป็นอย่างไร?", a: ["เงียบเหงา", "ขาดสีสัน", "ขาดคนเท่", "ถูกทุกข้อ"], c: 3 },
            { q: "9. คำนิยามของ 'นนท์ NA3' คืออะไร?", a: ["หล่ออมตะ", "เท่ระเบิด", "เฟี้ยวเงาะ", "ตำนานที่ยังมีลมหายใจ"], c: 1 },
            { q: "10. สรุปแล้วใน NA3 ใครคือที่ 1 ในใจคุณ?", a: ["นนท์", "นนท์เท่านั้น", "นนท์คนเดียว", "แน่นอนว่าต้องเป็นนนท์"], c: 0 }
        ];

        let currentQ = 0, score = 0, timer, timeLeft = 10, userName = "", canAnswer = true;

        document.getElementById('btn-start').onclick = () => {
            userName = document.getElementById('username').value.trim();
            if(!userName) return alert("ใส่ชื่อเพื่อความเท่หน่อยครับ!");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            if(currentQ >= questions.length) return endGame();
            canAnswer = true;
            clearInterval(timer);
            timeLeft = 10;
            updateUI();
            
            const qData = questions[currentQ];
            document.getElementById('q-number').innerText = `ข้อที่ ${currentQ + 1}/10`;
            document.getElementById('question-text').innerText = qData.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            qData.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                container.appendChild(btn);
            });

            timer = setInterval(() => {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) checkAnswer(-1, null);
            }, 1000);
        }

        function updateUI() {
            const prog = document.getElementById('timer-progress');
            prog.style.width = (timeLeft / 10 * 100) + "%";
            prog.style.background = timeLeft > 5 ? "#4caf50" : (timeLeft > 2 ? "#ffeb3b" : "#f44336");
        }

        function checkAnswer(idx, btn) {
            if(!canAnswer) return;
            canAnswer = false;
            clearInterval(timer);
            const correctIdx = questions[currentQ].c;

            if(idx === correctIdx) {
                if(btn) btn.classList.add('correct');
                document.getElementById('snd-correct').play();
                score += (timeLeft + 5); 
            } else {
                if(btn) btn.classList.add('wrong');
                document.querySelectorAll('.opt-btn')[correctIdx].classList.add('correct');
                document.getElementById('snd-wrong').play();
            }

            document.getElementById('score-now').innerText = "คะแนน: " + score;
            currentQ++;
            setTimeout(showQuestion, 1000);
        }

        async function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            try {
                await fetch(FIREBASE_URL, {
                    method: "POST",
                    body: JSON.stringify({ name: userName, score: score, date: new Date().toLocaleString() })
                });
                document.getElementById('save-status').innerText = "บันทึกอันดับความเท่แล้ว!";
                loadLeaderboard();
            } catch (e) { document.getElementById('save-status').innerText = "บันทึกล้มเหลว"; }
        }

        async function loadLeaderboard() {
            const res = await fetch(FIREBASE_URL);
            const data = await res.json();
            if(!data) return;
            let arr = Object.values(data).sort((a,b) => b.score - a.score);
            document.getElementById('rank-list').innerHTML = arr.slice(0,5).map((it, i) => 
                `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px 0;">
                    <span>${i+1}. ${it.name}</span>
                    <strong style="color:var(--primary)">${it.score}</strong>
                </div>`
            ).join('');
        }
    </script>
</body>
</html>
