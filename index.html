<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCB1 SAFETY QUIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004d40; --secondary: #00796b; --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; --bg: #e0f2f1; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: white; width: 92%; max-width: 480px; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .hidden { display: none !important; }
        input { width: 90%; padding: 16px; margin: 20px 0; border: 2px solid #b2dfdb; border-radius: 14px; font-size: 1.1rem; text-align: center; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 10px 0; font-weight: 500; transition: 0.2s; }
        button:hover { background: var(--secondary); transform: translateY(-2px); }
        #timer-bar { width: 100%; height: 14px; background: #eee; border-radius: 7px; margin: 20px 0; overflow: hidden; border: 1px solid #ddd; }
        #timer-progress { width: 100%; height: 100%; background: var(--green); transition: 1s linear; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .opt-btn { background: white; color: #333; border: 2px solid var(--primary); text-align: left; padding: 14px 20px; font-size: 1rem; border-radius: 14px; cursor: pointer; }
        .rank-box { margin-top: 25px; background: #f1f8e9; padding: 20px; border-radius: 16px; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; }
        
        /* Effect สั่นตอนเวลาเหลือน้อย */
        .pulse-warning { animation: pulse-red 0.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0px rgba(231, 76, 60, 0.4); } 100% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1 style="color: var(--primary); margin: 0;">🚢 LCB1 SAFETY QUIZ</h1>
        <p style="color: #666;">ตอบถูกและไว รับคะแนนสูงสุด!</p>
        <input type="text" id="username" placeholder="ระบุชื่อ และรหัสพนักงาน" maxlength="40">
        <button id="btn-start">เริ่มทำแบบทดสอบ</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="q-number" style="font-weight: bold; color: var(--primary);">ข้อที่ 1/20</span>
            <span id="score-now" style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem;">คะแนน: 0</span>
        </div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <h2 id="question-text" style="font-size: 1.2rem; color: #222; margin: 10px 0; min-height: 60px;">คำถาม...</h2>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="card hidden">
        <h2 style="margin: 0;">จบการทดสอบ!</h2>
        <div style="font-size: 3.5rem; font-weight: 700; color: var(--primary); margin: 10px 0;" id="final-score">0</div>
        <p id="save-status" style="color: var(--secondary); font-style: italic;">กำลังบันทึกคะแนน...</p>
        <div class="rank-box">
            <strong style="display: block; margin-bottom: 10px;">🏆 Top 5 อันดับสูงสุด</strong>
            <div id="rank-list">กำลังโหลดอันดับ...</div>
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; background: #555;">เล่นอีกครั้ง</button>
    </div>

    <!-- Sounds -->
    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2056/2056-preview.mp3"></audio>
    <audio id="snd-bg" src="https://assets.mixkit.co/active_storage/sfx/123/123-preview.mp3" loop></audio>

    <script>
        const FIREBASE_URL = "https://quizgame-bd719-default-rtdb.asia-southeast1.firebasedatabase.app/scores.json"; 

        const questions = [
            { q: "1. เมื่อได้ยินสัญญาณเตือนภัยฉุกเฉินในเขตท่าเรือ ควรทำอย่างไร?", a: ["หยุดทำงานและไปที่จุดรวมพลทันที", "ทำงานต่อจนกว่าหัวหน้าจะสั่ง", "ถ่ายรูปเหตุการณ์ลงกลุ่มไลน์", "รอฟังประกาศจากวิทยุอย่างเดียว"], c: 0 },
            { q: "2. ขณะเดินในลานตู้ คุณเห็น RTG Crane กำลังยกตู้เหนือพื้นที่ที่คุณต้องเดินผ่าน ควรทำอย่างไร?", a: ["รีบเดินผ่านก่อนที่ตู้จะลง", "รอจนกว่า Crane จะหยุดการเคลื่อนย้าย", "เดินอ้อมแต่ยังอยู่ในรัศมีการยก", "ส่งสัญญาณให้คนขับหยุด"], c: 1 },
            { q: "3. PPE ชิ้นใดที่ 'บังคับ' ต้องสวมใส่ทุกครั้งเมื่อเข้าเขตลานตู้คอนเทนเนอร์?", a: ["แว่นตากันแดด", "หน้ากากอนามัย", "หมวกนิรภัยและเสื้อสะท้อนแสง", "ถุงมือยาง"], c: 2 },
            { q: "4. ข้อใดคือกฎสำคัญที่สุดของการทำงานใกล้ตู้คอนเทนเนอร์ที่กำลังยก?", a: ["เดินให้เร็ว", "ห้ามอยู่ใต้โหลดที่กำลังยกเด็ดขาด", "ใช้โทรศัพท์ติดต่อ", "ยืนรอใกล้ๆ"], c: 1 },
            { q: "5. ก่อนเริ่มซ่อมบำรุงเครื่องจักรหรือระบบไฟฟ้า เพื่อความปลอดภัยสูงสุดควรทำอย่างไร?", a: ["ปิดเครื่องเฉยๆ", "ใช้ระบบ Lockout / Tagout", "รีบซ่อม", "แจ้งเพื่อน"], c: 1 },
            { q: "6. 'Near Miss' (เหตุการณ์เกือบเกิดอุบัติเหตุ) ควรรายงานหรือไม่?", a: ["ไม่ต้องรายงาน", "รายงานเฉพาะถ้ามีของเสียหาย", "ต้องรายงานเพื่อป้องกันอุบัติเหตุจริง", "รายงานเฉพาะตอนประชุม"], c: 2 },
            { q: "7. ก่อนที่ผู้รับเหมาจะเริ่มปฏิบัติงานเสี่ยง (เช่น งานร้อน, งานที่สูง) ในท่าเรือ ต้องดำเนินการสิ่งใดก่อน?", a: ["เริ่มงานได้เลยถ้าหัวหน้าสั่ง", "ขออนุมัติใบอนุญาตทำงาน (Work Permit)", "แจ้ง รปภ. ปากเปล่า", "รอให้งานเสร็จค่อยแจ้ง"], c: 1 },
            { q: "8. เมื่อเห็นสัญลักษณ์วงกลมสีฟ้าและมีรูปภาพสีขาว หมายถึงอะไร?", a: ["ป้ายห้ามเข้า", "ระวัง", "บังคับให้ปฏิบัติ/สวมใส่", "ทางหนีไฟ"], c: 2 },
            { q: "9. ความเร็วสูงสุดที่อนุญาตให้ขับขี่ภายในเขตท่าเรือคือเท่าใด?", a: ["30 กม./ชม.", "60 กม./ชม.", "80 กม./ชม.", "ขับตามความรีบ"], c: 0 },
            { q: "10. หากเพื่อนร่วมงานถูกไฟฟ้าดูดและยังติดกับสายไฟ ควรทำอย่างไร?", a: ["รีบเข้าไปดึงมือเพื่อน", "ใช้ไม้หรือวัตถุไม่เป็นตัวนำเขี่ยสายไฟออก", "สาดน้ำใส่เพื่อน", "รอให้ไฟดับเอง"], c: 1 },
            { q: "11. 'Safety First' ในความหมายของท่าเรือคือข้อใด?", a: ["ทำงานให้เสร็จเร็ว", "ความปลอดภัยต้องมาก่อนงานเสมอ", "สวม PPE เฉพาะเวลาตรวจ", "ทำงานเฉพาะตอนกลางวัน"], c: 1 },
            { q: "12. ตู้ที่มีป้าย 'Flammable Gas' หมายถึงสิ่งใด?", a: ["บรรจุอาหารสด", "บรรจุก๊าซไวไฟ", "บรรจุวัตถุระเบิด", "ตู้เปล่า"], c: 1 },
            { q: "13. หากเกิดสารเคมีกระเด็นเข้าตา ควรปฐมพยาบาลอย่างไร?", a: ["ขยี้ตาแรงๆ", "ล้างตาด้วยน้ำสะอาด 15-20 นาที", "ใช้สำลีเช็ด", "ใช้น้ำยาล้างห้องน้ำล้าง"], c: 1 },
            { q: "14. การทำงานบนที่สูง ต้องมีอุปกรณ์ป้องกันการตกเมื่อสูงเกินกี่เมตร?", a: ["1 เมตร", "2 เมตร", "5 เมตร", "10 เมตร"], c: 1 },
            { q: "15. วิธี 'ยกของหนัก' ที่ถูกต้องเพื่อป้องกันบาดเจ็บหลังคือข้อใด?", a: ["ก้มตัวลงยก", "ย่อเข่าลงหลังตรงใช้กำลังขา", "บิดตัวขณะยก", "ชูขึ้นเหนือศีรษะ"], c: 1 },
            { q: "16. อันตรายหลักของพื้นที่อับอากาศ (Confined Space) คือ?", a: ["ออกซิเจนต่ำ", "ก๊าซพิษ", "ก๊าซไวไฟ", "ถูกทุกข้อ"], c: 3 },
            { q: "17. 'Blind Spot' (จุดบอด) ของรถยก (Forklift) คือบริเวณใด?", a: ["ด้านหน้าตรงๆ", "ด้านหลังและด้านข้างที่มองไม่เห็น", "บนหลังคา", "ใต้ท้องรถ"], c: 1 },
            { q: "18. หากเกิดเหตุเพลิงไหม้ขนาดเล็ก สิ่งแรกที่ต้องทำคืออะไร?", a: ["ใช้ถังดับเพลิงที่เหมาะสม", "วิ่งไปหยิบมือถือ", "เดินไปดูว่าไหม้อะไร", "รอไฟดับเอง"], c: 0 },
            { q: "19. สัญลักษณ์รูปสามเหลี่ยมสีเหลือง ขอบดำ หมายถึงป้ายประเภทใด?", a: ["ป้ายห้าม", "ป้ายเตือน", "ป้ายทางออก", "ป้ายข้อมูล"], c: 1 },
            { q: "20. ใครมีหน้าที่รับผิดชอบด้านความปลอดภัยในท่าเรือ?", a: ["Safety เท่านั้น", "คนขับรถเท่านั้น", "พนักงานทุกคน", "รปภ. เท่านั้น"], c: 2 }
        ];

        let currentQ = 0, score = 0, timer, timeLeft = 15, userName = "";
        const sndCorrect = document.getElementById('snd-correct');
        const sndWrong = document.getElementById('snd-wrong');
        const sndTick = document.getElementById('snd-tick');
        const sndBg = document.getElementById('snd-bg');

        document.getElementById('btn-start').onclick = () => {
            userName = document.getElementById('username').value.trim();
            if(!userName) return alert("กรุณาระบุชื่อ และรหัสพนักงาน");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            sndBg.play().catch(e => console.log("Audio Error"));
            showQuestion();
        };

        function showQuestion() {
            if(currentQ >= questions.length) return endGame();
            clearInterval(timer);
            timeLeft = 15;
            updateUI();
            const qData = questions[currentQ];
            document.getElementById('q-number').innerText = `ข้อที่ ${currentQ + 1}/20`;
            document.getElementById('question-text').innerText = qData.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            qData.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                container.appendChild(btn);
            });
            timer = setInterval(() => {
                timeLeft--;
                updateUI();
                if(timeLeft <= 5 && timeLeft > 0) sndTick.play();
                if(timeLeft <= 0) checkAnswer(-1);
            }, 1000);
        }

        function updateUI() {
            const progress = document.getElementById('timer-progress');
            const card = document.getElementById('game-screen');
            progress.style.width = (timeLeft / 15 * 100) + "%";
            
            // ปรับสีตามความต้องการ: 15-11 เขียว | 10-6 เหลือง | 5-0 แดง
            if(timeLeft >= 11) { 
                progress.style.background = "var(--green)"; 
                card.classList.remove('pulse-warning');
            } else if(timeLeft >= 6) {
                progress.style.background = "var(--yellow)"; 
                card.classList.remove('pulse-warning');
            } else {
                progress.style.background = "var(--red)"; 
                card.classList.add('pulse-warning');
            }
        }

        function checkAnswer(idx) {
            clearInterval(timer);
            if(idx === questions[currentQ].c) {
                sndCorrect.currentTime = 0; sndCorrect.play();
                // 15-11 วินาที (5 วินาทีแรก) = 10 คะแนน
                // 10-6 วินาที = ลดคะแนนตามเวลา (9,8,7,6)
                // 5 วินาทีลงไป = ขั้นต่ำ 5 คะแนน
                let points = 10;
                if(timeLeft < 11 && timeLeft >= 6) points = timeLeft - 1; 
                if(timeLeft < 6) points = 5;
                score += points;
            } else {
                sndWrong.currentTime = 0; sndWrong.play();
            }
            document.getElementById('score-now').innerText = `คะแนน: ${score}`;
            currentQ++;
            setTimeout(showQuestion, 600);
        }

        async function endGame() {
            sndBg.pause();
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            try {
                await fetch(FIREBASE_URL, {
                    method: "POST",
                    body: JSON.stringify({ name: userName, score: score, date: new Date().toLocaleString() })
                });
                document.getElementById('save-status').innerText = "บันทึกข้อมูลเรียบร้อย!";
                loadLeaderboard();
            } catch (e) {
                document.getElementById('save-status').innerText = "บันทึกไม่สำเร็จ";
            }
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                if(!data) return;
                let arr = Object.values(data);
                arr.sort((a, b) => b.score - a.score);
                const list = document.getElementById('rank-list');
                list.innerHTML = arr.slice(0, 5).map((it, i) => `
                    <div class="rank-item">
                        <span>${i+1}. ${it.name}</span>
                        <strong style="color:var(--primary)">${it.score}</strong>
                    </div>`).join('');
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
