<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA3 TOP 3 CHALLENGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --bg: #f0f2f5; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 92%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .hidden { display: none !important; }
        
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; text-align: center; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; width: 100%; font-weight: 500; }
        
        #timer-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #timer-progress { width: 100%; height: 100%; background: #2ecc71; transition: 1s linear; }

        .options-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .opt-btn { background: white; border: 2px solid #eee; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1rem; text-align: left; }
        .correct { background: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important; }
        .wrong { background: #e74c3c !important; color: white !important; border-color: #e74c3c !important; }
        
        .top3-box { background: #fffde7; border: 2px solid var(--gold); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .rank-1 { color: #b8860b; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen" class="card">
        <h1 style="color: var(--primary); margin-bottom: 10px;">🏆 NA3 CHALLENGE</h1>
        
        <div class="top3-box">
            <strong style="color: #f57f17; display: block; margin-bottom: 8px; text-align: center;">👑 TOP 3 ขาโหด NA3</strong>
            <div id="top3-list">กำลังโหลดอันดับ...</div>
        </div>

        <p style="color: #666; font-size: 0.9rem;">เฉพาะคนทำแต้มติด TOP 3 เท่านั้นที่จะได้ขึ้นบอร์ด!</p>
        <input type="text" id="username" placeholder="ระบุชื่อของคุณ" maxlength="30">
        <button id="btn-start">เริ่มพิสูจน์ความจริง</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="q-number" style="font-weight: bold;">ข้อที่ 1/10</span>
            <span id="score-now" style="background: var(--primary); color: white; padding: 4px 12px; border-radius: 15px;">0</span>
        </div>
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <h2 id="question-text" style="font-size: 1.15rem; min-height: 50px;">?</h2>
        <div id="options-container" class="options-grid"></div>
    </div>

    <div id="result-screen" class="card hidden">
        <h2 id="result-title">จบการทดสอบ!</h2>
        <div style="font-size: 4rem; font-weight: 700; color: var(--primary);" id="final-score">0</div>
        <p id="save-status" style="font-weight: bold;"></p>
        <button onclick="location.reload()" style="margin-top: 20px; background: #555;">กลับไปหน้าหลัก</button>
    </div>

    <audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script>
        const FIREBASE_URL = "https://quizgame-bd719-default-rtdb.asia-southeast1.firebasedatabase.app/scores.json";

        const questions = [
            { q: "1. NA 3 คืออะไร?", a: ["ผู้คน", "สถานที่", "รถ", "บ้าน"], c: 0 },
            { q: "2. ใครเตี้ยสุด?", a: ["ไบค์", "เจมส์", "ฟ้า", "อาร์ท"], c: 3 },
            { q: "3. ร้านอาหารร้านโปรดหลังจากเล่นไฟ?", a: ["ป้าไข่เจียว", "หมูปิ้ง", "โอกาเนะ", "ราดหน้ายอดผัก"], c: 1 },
            { q: "4. ประวัติศาสตร์ที่มีการเกไพ่กันเยอะที่สุดคือ?", a: ["400", "500", "600", "700"], c: 3 },
            { q: "5. ใครที่พาสาวมาบ้านและไล่เพื่อนออกจากบ้านจนหมด?", a: ["คุณสตางค์", "ไอ้แบ้", "พง", "เจมส์"], c: 3 },
            { q: "6. ใครมีระยะทางวิ่งไกลที่สุดตอนที่ดื่มเหล้า?", a: ["นาย", "ปัน", "ฟ้า", "สปาย"], c: 2 },
            { q: "7. ห้องลับชั้นสองเป็นห้องสำหรับปฏิบัติการอะไร?", a: ["ห้องเชือด", "ห้องนอนเสริม", "ห้องสมุนไพร", "ฮ่องๆ"], c: 2 },
            { q: "8. ใครขโมยเงินบ้านบนลิ้นชักชั้นสอง?", a: ["นนท์", "เจมส์", "พี", "หาข้อสรุปไม่ได้"], c: 3 },
            { q: "9. ใครเคยเล็งสาวคนเดียวกัน?", a: ["เจมส์-นนท์", "ไบค์-ปัน", "พี-เนม", "เจมส์-ปัน"], c: 3 },
            { q: "10. ใครเคยหัวร้อนจนเล่นไฟหมดตัว?", a: ["นาย", "ฟ้า", "ปัน", "นิก"], c: 2 }
        ];

        let currentQ = 0, score = 0, timer, timeLeft = 15, userName = "", canAnswer = true;
        let top3Data = [];

        // โหลดอันดับตอนเปิดหน้าแรก
        async function loadTop3() {
            try {
                const res = await fetch(FIREBASE_URL);
                const data = await res.json();
                if(!data) { document.getElementById('top3-list').innerText = "ยังไม่มีข้อมูล"; return; }
                top3Data = Object.values(data).sort((a,b) => b.score - a.score).slice(0, 3);
                document.getElementById('top3-list').innerHTML = top3Data.map((it, i) => 
                    `<div class="rank-item ${i===0?'rank-1':''}">
                        <span>${i+1}. ${it.name}</span>
                        <strong>${it.score} แต้ม</strong>
                    </div>`).join('');
            } catch (e) { document.getElementById('top3-list').innerText = "โหลดข้อมูลไม่สำเร็จ"; }
        }
        loadTop3();

        document.getElementById('btn-start').onclick = () => {
            userName = document.getElementById('username').value.trim();
            if(!userName) return alert("ใส่ชื่อด้วยครับ!");
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            if(currentQ >= questions.length) return endGame();
            canAnswer = true;
            clearInterval(timer);
            timeLeft = 15;
            updateUI();
            const qData = questions[currentQ];
            document.getElementById('q-number').innerText = `ข้อที่ ${currentQ + 1}/10`;
            document.getElementById('question-text').innerText = qData.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            qData.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                container.appendChild(btn);
            });
            timer = setInterval(() => { timeLeft--; updateUI(); if(timeLeft <= 0) checkAnswer(-1, null); }, 1000);
        }

        function updateUI() {
            const prog = document.getElementById('timer-progress');
            prog.style.width = (timeLeft / 15 * 100) + "%";
            prog.style.background = timeLeft > 10 ? "#2ecc71" : (timeLeft > 5 ? "#f1c40f" : "#e74c3c");
        }

        function checkAnswer(idx, btn) {
            if(!canAnswer) return;
            canAnswer = false;
            clearInterval(timer);
            const correctIdx = questions[currentQ].c;
            if(idx === correctIdx) {
                if(btn) btn.classList.add('correct');
                document.getElementById('snd-correct').play();
                score += 100; // ข้อละ 100 คะแนน
            } else {
                if(btn) btn.classList.add('wrong');
                document.querySelectorAll('.opt-btn')[correctIdx].classList.add('correct');
                document.getElementById('snd-wrong').play();
            }
            document.getElementById('score-now').innerText = score;
            currentQ++;
            setTimeout(showQuestion, 1200);
        }

        async function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            // ตรวจสอบว่าติด TOP 3 หรือไม่
            const isTop3 = top3Data.length < 3 || score > top3Data[top3Data.length-1].score;

            if(isTop3) {
                document.getElementById('save-status').innerHTML = "🔥 ยินดีด้วย! คุณติด TOP 3 กำลังบันทึก...";
                try {
                    await fetch(FIREBASE_URL, {
                        method: "POST",
                        body: JSON.stringify({ name: userName, score: score, date: new Date().toLocaleString() })
                    });
                    document.getElementById('save-status').innerHTML = "✅ บันทึกชื่อคุณบนกระดานเกียรติยศแล้ว!";
                } catch (e) { document.getElementById('save-status').innerText = "บันทึกล้มเหลว"; }
            } else {
                document.getElementById('save-status').innerHTML = "💩 คะแนนไม่ถึง TOP 3 พยายามใหม่นะ!";
                document.getElementById('save-status').style.color = "#e74c3c";
            }
        }
    </script>
</body>
</html>
